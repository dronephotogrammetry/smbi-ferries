<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMBI Live Ferry Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f9; }
        #map { width: 100vw; height: 60vh; }
        #schedule-container { height: 40vh; padding: 15px; overflow-y: auto; box-sizing: border-box; }
        h2 { margin-top: 0; color: #333; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 5px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #0078d7; color: white; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="schedule-container">
        <h2>Upcoming Departures</h2>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Destination</th>
                    <th>Leaving From</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                <tr><td colspan="3">Loading schedule...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- MAP LOGIC & BOUNDARIES ---
        const bayBounds = [
            [-27.75, 153.20], 
            [-27.50, 153.45]  
        ];

        const map = L.map('map', {
            maxBounds: bayBounds,
            maxBoundsViscosity: 1.0, 
            minZoom: 11, 
            maxZoom: 15  
        }).setView([-27.615, 153.345], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO | Data: TransLink'
        }).addTo(map);

        // --- COLOR PALETTE LOGIC ---
        const icons = {
            'green': new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] }),
            'blue': new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] }),
            'orange': new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] }),
            'red': new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] })
        };

        // Make the colors dynamic based on the actual Trip Destination!
        function getFerryIcon(destination) {
            if (!destination) return icons['red'];
            const dest = destination.toLowerCase();
            
            if (dest.includes('redland bay')) return icons['green'];
            if (dest.includes('russell then')) return icons['blue'];
            if (dest.includes('karragarra then')) return icons['orange'];
            
            return icons['red']; // Covers "Russell Island" short runs or unknowns
        }

        // --- DRAW SMOOTH ROUTE LINES ---
        async function drawRouteLines() {
            try {
                const response = await fetch('/smbi-shapes.json');
                const shapes = await response.json();
                
                shapes.forEach(shape => {
                    L.polyline(shape.coords, {
                        color: '#445566', // Subtle dark grey/blue for the track
                        weight: 3,
                        opacity: 0.5,
                        dashArray: '5, 8' 
                    }).addTo(map);
                });
            } catch (error) {
                console.error("Could not load shape lines:", error);
            }
        }
        drawRouteLines();

        // --- LIVE FERRY LOGIC ---
        let ferryMarkers = [];
        async function updateFerryLocations() {
            try {
                const response = await fetch('/api/ferries');
                const ferries = await response.json();

                ferryMarkers.forEach(marker => map.removeLayer(marker));
                ferryMarkers = [];

                ferries.forEach(ferry => {
                    // Check the destination string to assign the icon color!
                    const iconColor = getFerryIcon(ferry.destination);

                    const marker = L.marker([ferry.latitude, ferry.longitude], { icon: iconColor }).addTo(map);
                    
                    // Show Name, Route, and Destination!
                    marker.bindPopup(`<b>${ferry.vesselName}</b><br>Route: Ferry<br>Heading to: ${ferry.destination}`);
                    ferryMarkers.push(marker);
                });
            } catch (error) {
                console.error("Map fetch error:", error);
            }
        }

        updateFerryLocations();
        setInterval(() => {
            if (!document.hidden) updateFerryLocations();
        }, 15000);

        // --- REAL SCHEDULE LOGIC ---
        async function loadSchedule() {
            try {
                const response = await fetch('/smbi-timetable.json');
                let scheduleData = await response.json();
                
                const now = new Date();
                const currentTimeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                                       now.getMinutes().toString().padStart(2, '0') + ":00";
                const currentDayOfWeek = now.getDay(); 

                let todaysFerries = scheduleData
                    .filter(trip => trip.days && trip.days[currentDayOfWeek] === true)
                    .filter(trip => trip.time >= currentTimeStr)
                    .sort((a, b) => a.time.localeCompare(b.time));

                const uniqueFerries = [];
                const seen = new Set();
                
                for (const trip of todaysFerries) {
                    const signature = `${trip.time}-${trip.destination}-${trip.stop}`;
                    if (!seen.has(signature)) {
                        seen.add(signature);
                        uniqueFerries.push(trip);
                    }
                }

                const terminals = ['Redland Bay Marina', 'Russell Island', 'Macleay Island', 'Lamb Island', 'Karragarra Island'];
                let finalDepartures = [];

                terminals.forEach(terminal => {
                    const ferriesFromHere = uniqueFerries.filter(trip => trip.stop.includes(terminal));
                    finalDepartures.push(...ferriesFromHere.slice(0, 2));
                });

                finalDepartures.sort((a, b) => a.time.localeCompare(b.time));

                const tableBody = document.getElementById('schedule-body');
                tableBody.innerHTML = ''; 

                if (finalDepartures.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="3">No more ferries today.</td></tr>';
                    return;
                }

                finalDepartures.forEach(trip => {
                    const [hour, min] = trip.time.split(':');
                    const dateObj = new Date();
                    dateObj.setHours(parseInt(hour) % 24, parseInt(min)); 
                    const friendlyTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    const row = `
                        <tr>
                            <td><strong>${friendlyTime}</strong></td>
                            <td>${trip.destination}</td>
                            <td>${trip.stop}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Schedule fetch error:", error);
                document.getElementById('schedule-body').innerHTML = '<tr><td colspan="3">Could not load schedule.</td></tr>';
            }
        }

        loadSchedule();
    </script>
</body>
</html>
